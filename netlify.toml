[build]
  publish = "."
  functions = "api/netlify/functions"
  command = "npm install"

# ── Block sensitive paths ───────────────────────────
[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

# ── App routes ──────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
